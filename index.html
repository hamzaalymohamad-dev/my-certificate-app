<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Critical Care ACE Day Portal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>

    <div class="card">
        <div class="header-section">
            <h2>Critical Care ACE Day</h2>
            <p>Audit & Clinical Effectiveness Collaborative</p>
            <p class="event-meta"><strong>28 April 2026</strong> | 13:30 – 16:15</p>
            <p class="event-meta">Coordinator: Mohamad Aly</p>
        </div>
        <hr>
        
        <div class="form-row">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="userName" placeholder="Name for certificates" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="userEmail" placeholder="To receive records" required>
            </div>
        </div>

        <h3 class="section-title">Session Feedback</h3>
        <p class="instruction">Please complete all sections. Use 'Did not attend' if you missed a session.</p>

        <div id="sessions-container">
            </div>

        <div id="error-msg" class="error-banner">
            ⚠️ Please provide feedback or check "Did not attend" for all sessions.
        </div>

        <button type="button" id="submitBtn" onclick="startProcess()">Submit All & Download Certificates</button>
    </div>

    <script src="app.js?v=115"></script>
</body>
</html>
