<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACE Day Portal | Clinical Audit Lead</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="watermark-bg"></div>

    <div class="card">
        <div class="header-section">
            <div class="logo-row">
                <img src="https://i.postimg.cc/4dGMV8wX/bee.png" class="bee-logo" alt="Critical Care Logo">
                <div class="nhs-logo-text" onclick="checkAdmin()">NHS</div>
                <img src="https://i.postimg.cc/bN5B3YLk/mft.png" class="trust-logo" alt="MFT Logo">
            </div>
            <h2>Critical Care ACE Day</h2>
            <p class="subtitle">Audit & Clinical Effectiveness Collaborative</p>
            <p class="lead-text">Clinical Audit Lead: Mohamad Aly</p>
            <p class="event-date-display" id="date-display">28 April 2026</p>
            <hr>
        </div>
        
        <div id="user-view">
            <div class="form-row">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="userName" placeholder="Name for certificate...">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="userEmail" placeholder="For records...">
                </div>
            </div>
            <div id="sessions-container"></div>
            <button type="button" class="btn-primary" onclick="startProcess()">Submit & Download Certificate</button>
        </div>

        <div id="admin-view" style="display:none;">
            <div class="admin-header-bar">
                <h3>Clinical Audit Lead Dashboard</h3>
                <button class="btn-danger" onclick="location.reload()">Exit Admin</button>
            </div>

            <div class="admin-tabs">
                <button class="tab-btn active" onclick="showTab('setup')">1. Setup Agenda</button>
                <button class="tab-btn" onclick="showTab('analysis')">2. Live Feedback Analysis</button>
            </div>

            <div id="tab-setup" class="tab-content">
                <div class="control-box">
                    <label>Global Event Date:</label>
                    <input type="text" id="admin-date-input" onchange="updateGlobalDate(this.value)">
                </div>
                <div id="admin-agenda-list" class="admin-list"></div>
                <button class="btn-sec" onclick="addSession()">+ Add New Session</button>
            </div>

            <div id="tab-analysis" class="tab-content" style="display:none;">
                <div class="control-box">
                    <h4>Automated Live Analysis</h4>
                    <button class="btn-primary" style="width:auto; padding:10px 20px;" onclick="fetchLiveFeedback()">Refresh Live Data</button>
                    <p id="sync-status" style="font-size:12px; margin-top:5px; color:#666;">Ready to sync with Web3Forms...</p>
                </div>
                <div id="analysis-results"></div>
            </div>
        </div>
    </div>

    <script src="app.js?v=1000"></script>
</body>
</html>
