<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Critical Care ACE Day Portal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="watermark-bg"></div>

    <div class="card">
        <div class="header-section">
            <div class="logo-row">
                <img src="https://i.postimg.cc/4dGMV8wX/bee.png" class="bee-logo" alt="Critical Care Logo">
                <img src="https://i.postimg.cc/bN5B3YLk/mft.png" class="trust-logo" alt="MFT Logo">
            </div>
            <h2>Critical Care ACE Day</h2>
            <p class="subtitle">Audit & Clinical Effectiveness Collaborative</p>
            <p class="lead-text">Clinical Audit Lead: Mohamad Aly</p>
            <p class="event-date-display" id="date-display"></p>
            <hr>
        </div>
        
        <div id="user-view">
            <div class="form-row">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="userName" placeholder="For your certificate..." required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="userEmail" placeholder="e.g. name@mft.nhs.uk" required>
                </div>
            </div>

            <div id="sessions-container"></div>

            <div class="overall-feedback">
                <label><strong>General Feedback on the Whole Day</strong></label>
                <textarea id="generalFeedback" placeholder="What went well? Any suggestions for next time?"></textarea>
            </div>

            <button type="button" class="btn-primary" onclick="startProcess()">Submit & Download Certificate</button>
        </div>

        <div id="admin-view" style="display:none;">
            <div class="admin-header-bar">
                <h3>Admin Dashboard</h3>
                <button class="btn-danger" onclick="location.reload()">Logout</button>
            </div>

            <div class="admin-tabs">
                <button class="tab-btn active" id="btn-tab-setup" onclick="showTab('setup')">Manage Agenda</button>
                <button class="tab-btn" id="btn-tab-analysis" onclick="showTab('analysis')">Feedback Analysis</button>
            </div>

            <div id="tab-setup" class="tab-content">
                <div class="control-box">
                    <label>Event Date:</label>
                    <input type="text" id="admin-date-input" onchange="updateGlobalDate(this.value)">
                </div>
                <div id="admin-agenda-list"></div>
                <button class="btn-sec" onclick="addSession()">+ Add New Session</button>
            </div>

            <div id="tab-analysis" class="tab-content" style="display:none;">
                <div class="control-box">
                    <h4>Live Data Importer</h4>
                    <p>Upload the Web3Forms CSV export to generate charts.</p>
                    <button class="btn-sec" onclick="document.getElementById('csv-file-input').click()">📁 Upload CSV File</button>
                    <input type="file" id="csv-file-input" accept=".csv" style="display:none;" onchange="handleFileUpload(event)">
                    <textarea id="raw-data-input" placeholder="Or paste raw text here..." style="margin-top:10px; height:60px;"></textarea>
                    <button class="btn-primary" style="width:auto; padding:10px 20px; margin-top:10px;" onclick="processImportedData()">Generate Analysis</button>
                </div>
                <div id="analysis-results"></div>
            </div>
        </div>

        <div class="footer-login">
            <span onclick="checkAdmin()">Admin Login</span>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
