<!DOCTYPE html>
<html>
<head>
    <title>Feedback & Certificate App</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <h1>Event Feedback</h1>
        <p>Fill this out to get your certificate.</p>
        
        <input type="text" id="userName" placeholder="Your Name">
        <input type="email" id="userEmail" placeholder="Your Email">
        
        <select id="topic">
            <option>Select a Topic</option>
            <option value="Topic 1">Introduction to AI</option>
            <option value="Topic 2">Modern Web Design</option>
        </select>

        <button onclick="startProcess()">Submit & Get Certificate</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
