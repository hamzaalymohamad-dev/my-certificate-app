<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACE Day Portal | Clinical Audit Lead</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="card" id="main-container">
        <div class="header-section">
            <div class="nhs-logo" onclick="checkAdmin()">NHS</div>
            <h2>Critical Care ACE Day</h2>
            <p class="subtitle">Audit & Clinical Effectiveness Collaborative</p>
            <p class="lead-text">Clinical Audit Lead: Mohamad Aly</p>
            <hr>
        </div>
        
        <div id="user-view">
            <div class="form-row">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="userName" placeholder="For your certificate..." required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="userEmail" placeholder="For our records..." required>
                </div>
            </div>

            <div id="sessions-container"></div>

            <div id="error-msg" class="error-banner">
                ⚠️ Please provide feedback for all sessions you attended.
            </div>

            <button type="button" class="btn-primary" id="submitBtn" onclick="startProcess()">
                Submit Feedback & Download Certificate
            </button>
        </div>

        <div id="admin-view" style="display:none;">
            <div class="admin-nav">
                <h3>Clinical Audit Lead Dashboard</h3>
                <button class="btn-danger" onclick="location.reload()">Exit Admin</button>
            </div>

            <div class="admin-tabs">
                <button class="tab-btn active" id="tab-btn-manage" onclick="showTab('manage')">Manage Agenda</button>
                <button class="tab-btn" id="tab-btn-analysis" onclick="showTab('analysis')">Feedback Analysis</button>
            </div>

            <div id="tab-manage" class="tab-content">
                <div class="admin-tools">
                    <button class="btn-sec" onclick="addSession()">+ Add New Session</button>
                </div>
                <div id="admin-agenda-list"></div>
            </div>

            <div id="tab-analysis" class="tab-content" style="display:none;">
                <p class="info-text">Visual performance metrics for each session based on feedback data.</p>
                <div id="charts-container" class="charts-grid"></div>
            </div>
        </div>
    </div>

    <script src="app.js?v=700"></script>
</body>
</html>
