<div class="card">
    <h2>Critical Care ACE Day</h2>
    <p><strong>Date:</strong> 28 April 2026 | <strong>Time:</strong> 13:30 – 16:15</p>
    <p>Coordinator: Mohamad Aly</p>
    <hr>
    
    <div class="form-group">
        <input type="text" id="userName" placeholder="Full Name (for certificate)" required>
        <input type="email" id="userEmail" placeholder="Email Address" required>
    </div>

    <div class="form-group">
        <label for="topic">Select Session (or 'NA' if not attended):</label>
        <select id="topic">
            <option value="">-- Choose Session --</option>
            <option value="NA">NA - Did not attend any session</option>
            <option value="ICU Echo Audit" data-presenter="Steve Benington, Suraj, Vikas & Hussein">13:30 ICU Echo Audit</option>
            <option value="Vancomycin Infusions Re-Audit" data-presenter="Anna Tilley">14:15 Vancomycin Infusions Re-Audit</option>
            <option value="Critical Care Updates" data-presenter="Evangelos Boultoukas">14:35 Critical Care Updates</option>
            <option value="Critical Care Ethics" data-presenter="Bernard Foex">15:05 Critical Care Ethics</option>
            <option value="PICC Line Service at ORC" data-presenter="Ruth Wynn">15:45 PICC Line Service at ORC</option>
        </select>
    </div>

    <div class="form-group rating-box">
        <label>Quality of Presentation (Content):</label>
        <select id="ratingPresentation">
            <option value="">-- Rate --</option>
            <option value="Excellent">Excellent</option>
            <option value="Good">Good</option>
            <option value="Satisfactory">Satisfactory</option>
            <option value="Poor">Poor</option>
            <option value="NA">NA</option>
        </select>
    </div>

    <div class="form-group rating-box">
        <label>Quality of Delivery (Speaker):</label>
        <select id="ratingDelivery">
            <option value="">-- Rate --</option>
            <option value="Excellent">Excellent</option>
            <option value="Good">Good</option>
            <option value="Satisfactory">Satisfactory</option>
            <option value="Poor">Poor</option>
            <option value="NA">NA</option>
        </select>
    </div>

    <div class="form-group">
        <label for="feedback">Key Takeaway/Impact on Practice:</label>
        <textarea id="feedback" placeholder="Your feedback..." rows="3"></textarea>
    </div>

    <button type="button" onclick="startProcess()">Submit Feedback & Get Certificate</button>
</div>
