<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACE Day Portal | Clinical Audit Lead</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="watermark-bg"></div>

    <div class="card">
        <div class="header-section">
            <div class="logo-row">
                <img src="https://i.postimg.cc/bN5B3YLk/mft.png" class="trust-logo" alt="MFT Logo">
                <div class="nhs-logo-text" onclick="checkAdmin()">NHS</div>
                <img src="https://i.postimg.cc/4dGMV8wX/bee.png" class="bee-logo" alt="Critical Care Logo">
            </div>
            <h2>Critical Care ACE Day</h2>
            <p class="subtitle">Audit & Clinical Effectiveness Collaborative</p>
            <p class="lead-text">Clinical Audit Lead: Mohamad Aly</p>
            <p class="event-date-display" id="date-display">28 April 2026</p>
            <hr>
        </div>
        
        <div id="user-view">
            <div class="form-row">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="userName" placeholder="For your certificate...">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="userEmail" placeholder="For our records...">
                </div>
            </div>
            <div id="sessions-container"></div>
            <button type="button" class="btn-primary" onclick="startProcess()">Submit & Download Certificate</button>
        </div>

        <div id="admin-view" style="display:none;">
            <div class="admin-nav">
                <h3>Clinical Audit Lead Dashboard</h3>
                <button class="btn-danger" onclick="location.reload()">Exit Admin</button>
            </div>
            
            <div class="admin-date-config">
                <label>Set Event Date:</label>
                <input type="text" id="admin-date-input" onchange="updateGlobalDate(this.value)">
            </div>

            <div class="admin-tabs">
                <button class="tab-btn active" id="tab-btn-manage" onclick="showTab('manage')">Manage Agenda</button>
                <button class="tab-btn" id="tab-btn-analysis" onclick="showTab('analysis')">Feedback Analysis</button>
            </div>

            <div id="tab-manage" class="tab-content">
                <button class="btn-sec" onclick="addSession()">+ Add New Session</button>
                <div id="admin-agenda-list"></div>
            </div>

            <div id="tab-analysis" class="tab-content" style="display:none;">
                <div id="charts-container" class="charts-grid"></div>
            </div>
        </div>
    </div>

    <script src="app.js?v=800"></script>
</body>
</html>
