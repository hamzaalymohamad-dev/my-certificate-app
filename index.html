<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback & Certificate App</title>
    
    <link rel="stylesheet" href="style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>

    <div class="card">
        <h1>Event Feedback</h1>
        <p>Fill this out to get your certificate.</p>
        
        <input type="text" id="userName" placeholder="Your Name" required>
        <input type="email" id="userEmail" placeholder="Your Email" required>
        
        <select id="topic">
            <option value="Select a Topic">Select a Topic</option>
            <option value="Introduction to AI">Introduction to AI</option>
            <option value="Modern Web Design">Modern Web Design</option>
        </select>

        <button type="button" onclick="startProcess()">Submit & Get Certificate</button>
    </div>

    <script src="app.js?v=99"></script>
</body>
</html>
