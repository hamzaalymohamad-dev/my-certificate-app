<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Critical Care ACE Day</title>
    <link rel="stylesheet" href="style.css">
    <!-- Required for PDF Generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div id="user-view">
        <div class="header">
            <img src="https://i.postimg.cc/bN5B3YLk/mft.png" alt="MFT Logo" class="logo">
            <h1>Critical Care ACE Day</h1>
            <p>Feedback & Certification</p>
        </div>

        <div class="main-card">
            <input type="text" id="userName" placeholder="Full Name (for certificate)" required>
            <input type="email" id="userEmail" placeholder="Email Address" required>
            
            <div id="sessions-container">
                <!-- Script will fill this -->
            </div>

            <div class="session-card">
                <label><strong>Overall Feedback:</strong></label>
                <textarea id="generalFeedback" placeholder="Your thoughts on the day..."></textarea>
            </div>

            <button onclick="startProcess()" class="btn-submit">Submit & Download Certificate</button>
        </div>

        <div class="admin-footer">
            <button onclick="checkAdmin()" class="btn-admin-link">Admin Login</button>
        </div>
    </div>

    <div id="admin-view" style="display:none;">
        <div class="header">
            <h1>Admin Dashboard</h1>
            <button onclick="location.reload()" class="btn-back">← Back</button>
        </div>
        <div class="admin-controls">
            <button onclick="exportToCSV()" class="btn-download">📥 Download CSV (Excel)</button>
            <button onclick="clearLogs()" class="btn-clear">🗑️ Clear All Data</button>
        </div>
        <div id="attendance-log-list" class="log-list"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
