<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Critical Care ACE Day Portal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="watermark-bg"></div>
    <div class="card">
        <div class="header-section">
            <div class="logo-row">
                <img src="https://i.postimg.cc/4dGMV8wX/bee.png" class="bee-logo">
                <img src="https://i.postimg.cc/bN5B3YLk/mft.png" class="trust-logo">
            </div>
            <h1>Critical Care ACE Day</h1>
            <p class="event-tagline">Audit • Case-based discussion • Evidence</p>
            <div id="date-display" class="date-badge">-- April 2026 --</div>
        </div>

        <div id="user-view">
            <div id="form-closed-msg" style="display:none;" class="status-msg error">
                <h3>Portal Currently Closed</h3>
                <p>Please contact the Audit Lead if you believe this is an error.</p>
            </div>

            <div id="form-active-area">
                <div class="input-grid">
                    <div class="input-group">
                        <label>Full Name *</label>
                        <input type="text" id="userName" placeholder="Enter your full name" required>
                    </div>
                    <div class="input-group">
                        <label>Email Address *</label>
                        <input type="email" id="userEmail" placeholder="name@example.com" required>
                    </div>
                </div>

                <div id="sessions-container" class="sessions-wrapper"></div>

                <div class="input-group full-width">
                    <label>Overall Event Feedback & Future Suggestions *</label>
                    <textarea id="generalFeedback" placeholder="How was your experience today? What would you like to see next time?" required></textarea>
                </div>

                <button class="btn-main" onclick="startProcess()">Submit & Generate Certificate</button>
            </div>
        </div>

        <div id="admin-view" style="display:none;">
            <div class="admin-top-nav">
                <h3>Admin Dashboard</h3>
                <button class="btn-success" onclick="syncToLive()">Sync Changes to Live</button>
            </div>
            
            <div class="tab-bar">
                <button class="tab-btn active" id="btn-tab-agenda" onclick="showTab('agenda')">Manage Agenda</button>
                <button class="tab-btn" id="btn-tab-analysis" onclick="showTab('analysis')">Data Analysis</button>
                <button class="tab-btn" id="btn-tab-logs" onclick="showTab('logs')">Attendance Logs</button>
            </div>

            <div id="tab-agenda" class="tab-content">
                <div class="input-grid admin-meta">
                    <div class="input-group">
                        <label>Event Date Display:</label>
                        <input type="text" id="admin-date-input">
                    </div>
                    <div class="input-group">
                        <label>Portal Status:</label>
                        <select id="form-status-toggle">
                            <option value="open">Open (Accepting Responses)</option>
                            <option value="closed">Closed (View Only)</option>
                        </select>
                    </div>
                </div>
                <div id="admin-agenda-list" class="admin-list"></div>
                <button class="btn-outline" onclick="addSession()">+ Add New Session</button>
            </div>

            <div id="tab-analysis" class="tab-content" style="display:none;">
                <div class="upload-zone">
                    <label><strong>Import CSV from Web3Forms:</strong></label>
                    <input type="file" accept=".csv" onchange="handleFileUpload(event)">
                </div>
                <textarea id="raw-data-input" style="display:none;"></textarea>
                <div id="analysis-results" class="results-grid"></div>
            </div>

            <div id="tab-logs" class="tab-content" style="display:none;">
                <div class="log-controls">
                    <button class="btn-danger-sm" onclick="clearAllLogs()">Clear All Logs</button>
                </div>
                <div id="attendance-log-list" class="log-table"></div>
            </div>

            <button class="btn-logout" onclick="location.reload()">Logout Session</button>
        </div>

        <div class="admin-trigger" onclick="checkAdmin()">Admin Access</div>
    </div>
    <script src="app.js"></script>
</body>
</html>
