<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Critical Care ACE Day Portal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

    <div class="card">
        <div class="header-section">
            <h2>Critical Care ACE Day</h2>
            <p class="subtitle">Audit & Clinical Effectiveness Collaborative</p>
            <p class="event-meta"><strong>28 April 2026</strong> | 13:30 – 16:15</p>
            <hr>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="userName" placeholder="For certificate..." required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="userEmail" placeholder="For records..." required>
            </div>
        </div>

        <h3 class="section-title">Session Feedback</h3>
        <div id="sessions-container"></div>

        <div id="error-msg" class="error-banner">
            ⚠️ Please provide feedback for all attended sessions.
        </div>

        <button type="button" id="submitBtn" onclick="startProcess()">Submit & Download Certificate</button>
    </div>

    <script src="app.js?v=215"></script>
</body>
</html>
