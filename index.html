<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Critical Care ACE Day Portal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="card">
        <div class="header-section">
            <div class="logo-row">
                <img src="https://i.postimg.cc/4dGMV8wX/bee.png" class="bee-logo">
                <img src="https://i.postimg.cc/bN5B3YLk/mft.png" class="trust-logo">
            </div>
            <h2>Critical Care ACE Day</h2>
            <div id="date-display" style="color:#005eb8; font-weight:bold;">-- April 2026 --</div>
        </div>

        <div id="user-view">
            <div id="form-closed-msg" style="display:none; text-align:center;"><h3>Form Currently Closed</h3></div>
            <div id="form-active-area">
                <div class="form-row">
                    <input type="text" id="userName" placeholder="Full Name for Certificate *" required>
                    <input type="email" id="userEmail" placeholder="Email Address *" required>
                </div>
                <div id="sessions-container"></div>
                <textarea id="generalFeedback" placeholder="Overall Feedback on the event... *" required></textarea>
                <button class="btn-primary" onclick="startProcess()" style="margin-top:20px;">Submit & Download Certificate</button>
            </div>
        </div>

        <div id="admin-view" style="display:none;">
            <div class="admin-header-bar">
                <span>Admin Panel</span>
                <button class="btn-sync" onclick="syncToLive()">Sync to Live</button>
            </div>
            <div class="admin-tabs">
                <button class="tab-btn active" id="btn-tab-agenda" onclick="showTab('agenda')">Agenda</button>
                <button class="tab-btn" id="btn-tab-analysis" onclick="showTab('analysis')">Analysis</button>
                <button class="tab-btn" id="btn-tab-logs" onclick="showTab('logs')">Logs</button>
            </div>
            <div id="tab-agenda" class="tab-content">
                <input type="text" id="admin-date-input" style="margin-bottom:10px;">
                <select id="form-status-toggle" style="margin-bottom:15px;">
                    <option value="open">Portal Open</option>
                    <option value="closed">Portal Closed</option>
                </select>
                <div id="admin-agenda-list"></div>
                <button class="btn-sec" onclick="addSession()">+ Add Session</button>
            </div>
            <div id="tab-analysis" class="tab-content" style="display:none;">
                <input type="file" accept=".csv" onchange="handleFileUpload(event)">
                <textarea id="raw-data-input" style="display:none;"></textarea>
                <div id="analysis-results" style="margin-top:20px;"></div>
            </div>
            <div id="tab-logs" class="tab-content" style="display:none;">
                <div id="attendance-log-list" style="background:#fff; border-radius:8px;"></div>
            </div>
            <button class="btn-sec" style="color:#999; border-color:#eee;" onclick="location.reload()">Logout</button>
        </div>

        <div class="footer-login" onclick="checkAdmin()">Admin Login</div>
    </div>
    <script src="app.js"></script>
</body>
</html>
