<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
const ACCESS_KEY = "d0491ab4-b81b-43f5-9341-10a60a6309fe";
const ADMIN_PASS = "Aly2026";
const WATERMARK_URL = "https://i.postimg.cc/x8C63BzL/Designer-2-removebg-preview.png";
const MFT_LOGO = "https://i.postimg.cc/bN5B3YLk/mft.png";
const BEE_LOGO = "https://i.postimg.cc/4dGMV8wX/bee.png";

const AGENDA_DATA = [
    { id: 1, title: "Critical Care Echo Audit" },
    { id: 2, title: "Vancomycin Infusions Re-Audit" },
    { id: 3, title: "Quality and Safety Update in ORC" },
    { id: 4, title: "Justice in Critical Care" },
    { id: 5, title: "PICC Line Insertion Service" }
];

// 1. FORCED UI INITIALIZATION
function initializeApp() {
    let mainView = document.getElementById('user-view');
    if (!mainView) {
        mainView = document.createElement('div');
        mainView.id = 'user-view';
        document.body.prepend(mainView);
    }

    if (!document.getElementById('setup-done')) {
        mainView.innerHTML = `
            <div style="max-width:600px; margin:20px auto; font-family:sans-serif; padding:20px;" id="setup-done">
                <div style="text-align:center; margin-bottom:20px;">
                    <img src="${MFT_LOGO}" style="height:50px;">
                    <h2 style="color:#005eb8;">ACE Day Feedback & Certificate</h2>
                </div>
                
                <input type="text" id="userName" placeholder="Full Name (for certificate)" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ccc; border-radius:5px;">
                <input type="email" id="userEmail" placeholder="Email Address" style="width:100%; padding:12px; margin-bottom:20px; border:1px solid #ccc; border-radius:5px;">
                
                <div id="sessions-container"></div>
                
                <textarea id="generalFeedback" placeholder="Overall thoughts on the day..." style="width:100%; height:80px; margin-top:20px; padding:10px; border:1px solid #ccc; border-radius:5px;"></textarea>
                
                <button onclick="startProcess()" style="width:100%; padding:15px; background:#005eb8; color:white; border:none; border-radius:5px; font-weight:bold; font-size:1.1em; margin-top:20px; cursor:pointer;">
                    Submit & Download Certificate
                </button>
                
                <div style="text-align:center; margin-top:30px;">
                    <button onclick="checkAdmin()" style="background:none; border:none; color:#ccc; cursor:pointer; font-size:0.8em;">Admin Login</button>
                </div>
            </div>
            <div id="admin-view" style="display:none; max-width:600px; margin:20px auto; font-family:sans-serif; padding:20px;">
                <button onclick="location.reload()" style="margin-bottom:10px;">← Back</button>
                <h3>Attendance Log</h3>
                <div id="attendance-log-list"></div>
            </div>
        `;
        renderAgenda();
    }
}

function renderAgenda() {
    const container = document.getElementById('sessions-container');
    container.innerHTML = AGENDA_DATA.map(item => `
        <div class="card" style="border:1px solid #ddd; padding:15px; margin-bottom:10px; border-radius:8px; background:#f9f9f9;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <strong style="color:#333;">${item.title}</strong>
                <label style="font-size:0.8em; color:#666;">
                    <input type="checkbox" onchange="toggleSession('${item.id}', this.checked)"> N/A
                </label>
            </div>
            <div id="fields-${item.id}" style="margin-top:10px;">
                <select id="r1-${item.id}" style="width:48%; padding:5px; margin-right:2%;">
                    <option value="">Quality</option>
                    <option>Excellent</option><option>Good</option><option>Average</option>
                </select>
                <select id="r2-${item.id}" style="width:48%; padding:5px;">
                    <option value="">Delivery</option>
                    <option>Excellent</option><option>Good</option><option>Average</option>
                </select>
            </div>
        </div>
    `).join('');
}

function toggleSession(id, isNA) {
    const div = document.getElementById(`fields-${id}`);
    div.style.opacity = isNA ? "0.3" : "1";
    div.querySelectorAll('select').forEach(s => s.disabled = isNA);
}

// 2. SUBMISSION LOGIC
async function startProcess() {
    const name = document.getElementById('userName').value.trim();
    const email = document.getElementById('userEmail').value.trim();
    const gen = document.getElementById('generalFeedback').value.trim();

    if (!name || !email) return alert("Please enter Name and Email");

    let attended = [];
    AGENDA_DATA.forEach(item => {
        if (!document.querySelector(`#na-${item.id}`)?.checked) {
            attended.push(item.title);
        }
    });

    // Save Data
    let logs = JSON.parse(localStorage.getItem('ace_attendance_log') || "[]");
    logs.push({ name, email, date: new Date().toLocaleString(), sessions: attended });
    localStorage.setItem('ace_attendance_log', JSON.stringify(logs));

    // Success Message
    document.getElementById('setup-done').innerHTML = `
        <div style="text-align:center; padding:40px;">
            <h2 style="color:#005eb8;">Success!</h2>
            <p>Thank you ${name}. Your certificate is downloading.</p>
            <button onclick="location.reload()" style="padding:10px 20px; background:#005eb8; color:white; border:none; border-radius:5px;">Submit Another</button>
        </div>
    `;

    // Generate PDF & Email
    await generateCert(name, attended);
    
    fetch("https://api.web3forms.com/submit", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            access_key: ACCESS_KEY,
            name: name,
            email: email,
            message: `New Attendance: ${name}\nSessions: ${attended.join(', ')}\nFeedback: ${gen}`
        })
    });
}

// 3. CERTIFICATE ENGINE
async function generateCert(name, sessions) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('l', 'pt', 'a4');
    
    // Border
    doc.setDrawColor(0, 94, 184).setLineWidth(5).rect(20, 20, 802, 555);
    
    // Logos
    try {
        doc.addImage(BEE_LOGO, 'PNG', 40, 40, 50, 50);
        doc.addImage(MFT_LOGO, 'PNG', 680, 40, 120, 45);
    } catch(e) {}

    doc.setFont("helvetica", "bold").setFontSize(30).setTextColor(0, 51, 102);
    doc.text("Critical Care ACE Day", 421, 120, {align:"center"});
    
    doc.setFontSize(20).setTextColor(0).text("CERTIFICATE OF ATTENDANCE", 421, 180, {align:"center"});
    
    doc.setFontSize(45).setTextColor(0, 94, 184).text(name, 421, 280, {align:"center"});
    
    doc.setFontSize(16).setTextColor(0).setFont("helvetica", "normal");
    doc.text("Has participated in clinical audit and education sessions regarding:", 421, 330, {align:"center"});
    
    doc.setFontSize(11);
    let y = 360;
    sessions.forEach(s => {
        doc.text(`• ${s}`, 421, y, {align:"center"});
        y += 20;
    });

    doc.setFont("helvetica", "bold").text("Mohamad Aly - Clinical Audit Lead", 421, 530, {align:"center"});
    
    doc.save(`${name}_ACE_Certificate.pdf`);
}

// 4. ADMIN LOGIN
function checkAdmin() {
    if (prompt("Password:") === ADMIN_PASS) {
        document.getElementById('setup-done').style.display = 'none';
        document.getElementById('admin-view').style.display = 'block';
        const logs = JSON.parse(localStorage.getItem('ace_attendance_log') || "[]");
        document.getElementById('attendance-log-list').innerHTML = logs.reverse().map(l => `
            <div style="padding:10px; border-bottom:1px solid #eee;">
                <strong>${l.name}</strong> - ${l.email}<br><small>${l.date}</small>
            </div>
        `).join('') || "No logs found.";
    }
}

// Run immediately
window.onload = initializeApp;
// Force check every 2 seconds in case GitHub script loading lags
setInterval(initializeApp, 2000);
</script>
